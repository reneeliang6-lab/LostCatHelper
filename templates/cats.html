<!DOCTYPE html>
<html>

<head>
    <title>Lost Cats</title>
</head>

<body>

<h1>🐱 Lost Cats</h1>

<form action="/cats" method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search by location">

    <button type="submit">
        Search
    </button>

</form>

<br>

{% if cats %}

    {% for cat in cats %}

        <div class="card">

            <img src="/uploads/{{ cat[5] }}" width="200">

            <h2>{{ cat[1] }}</h2>

            <p>{{ cat[2] }}</p>

            <p>📍 {{ cat[3] }}</p>

            <p>📞 {{ cat[4] }}</p>

        </div>

    {% endfor %}

{% else %}

    <h3>No lost cats found.</h3>

{% endif %}

</body>

</html>
