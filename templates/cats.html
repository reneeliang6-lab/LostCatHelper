<!DOCTYPE html>
<html>

<head>
    <title>Lost Cats</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>
    <a href="/">🏠 Home</a>
    <a href="/cats">🐱 View Lost Cats</a>
</nav>

<hr>

<div class="container">

    <h1>🐱 Lost Cats</h1>

    <form action="/cats" method="GET">

        <input
            type="text"
            name="search"
            placeholder="Search by location">

        <button type="submit">Search</button>

    </form>

    <br>

    {% if cats %}

        {% for cat in cats %}

            <div class="card">

                <img src="/uploads/{{ cat[5] }}" width="250">

                <h2>{{ cat[1] }}</h2>

                <p><strong>Description:</strong> {{ cat[2] }}</p>

                <p>📍 {{ cat[3] }}</p>

                <p>📞 {{ cat[4] }}</p>

                <a href="/delete/{{ cat[0] }}">
                    <button>Delete</button>
                </a>

                <a href="/edit/{{ cat[0] }}">
                    <button>Edit</button>
                </a>

                <a href="/poster/{{ cat[0] }}">
                    <button>📄 Generate Poster</button>
                </a>

                <a href="/sighting/{{ cat[0] }}">
                    <button>👀 Report Sighting</button>
                </a>

                <a href="/view_sightings/{{ cat[0] }}">
                    <button>📍 View Sightings</button>
                </a>

            </div>

        {% endfor %}

    {% else %}

        <h2>No lost cats found.</h2>

    {% endif %}

</div>

<hr>

<p style="text-align:center;">
    Lost Cat Helper © 2026
</p>

</body>

</html>
